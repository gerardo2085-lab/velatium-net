<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#000000"><link rel="manifest" href="/manifest.json"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/src/styles/tokens.css"><link rel="stylesheet" href="/src/styles/noir.css"><title>Literacy — Request Access</title></head> <body>  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;"> <div class="logo" style="margin-bottom:32px;"> <div class="logo-mark"> <svg class="logo-arcs" viewBox="0 0 48 48" fill="none"> <path d="M24 36 Q12 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q8 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q4 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 36 Q36 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q40 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q44 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> </svg> <span class="logo-n">N</span> </div> <span class="logo-wordmark">LITERACY</span> </div> <div class="card" style="width:100%;max-width:360px;"> <form id="register-form" style="display:flex;flex-direction:column;gap:12px;"> <div id="error-msg" style="display:none;color:#ff4444;font-size:13px;text-align:center;padding:8px 0;"></div> <div id="success-msg" style="display:none;color:var(--text-secondary);font-size:14px;text-align:center;padding:16px 0;line-height:1.6;"></div> <div id="form-fields" style="display:flex;flex-direction:column;gap:12px;"> <input type="text" id="username" placeholder="Name" autocomplete="name" required> <input type="email" id="email" placeholder="Email" autocomplete="email" required> <input type="password" id="password" placeholder="Password" autocomplete="new-password" required> <button type="submit" id="submit-btn">Request Access</button> </div> </form> <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
Already have access? <a href="/">Sign in</a> </p> </div> </div> <script type="module">document.getElementById("register-form").addEventListener("submit",async o=>{o.preventDefault();const e=document.getElementById("submit-btn"),n=document.getElementById("error-msg"),s=document.getElementById("success-msg");e.textContent="Sending…",e.disabled=!0,n.style.display="none";try{const t=await fetch(`${window.API}/auth/register`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,email:document.getElementById("email").value,password:document.getElementById("password").value})}),d=await t.json();if(!t.ok)throw new Error(d.error||"Registration failed");document.getElementById("form-fields").style.display="none",s.textContent="Request sent. You'll be notified when approved.",s.style.display="block"}catch(t){n.textContent=t.message,n.style.display="block",e.textContent="Request Access",e.disabled=!1}});</script>  <script>(function(){const isProtected = false;
const adminOnly = false;
const API = "https://api.thevelatium.net";

    const token = sessionStorage.getItem('literacy_token');
    const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');

    if (isProtected && !token) {
      location.href = '/';
    }
    if (adminOnly && (!user || user.role !== 'admin')) {
      location.href = '/shelf';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }

    window.API = API;
    window.authToken = token;
    window.currentUser = user;
  })();</script> </body> </html>
