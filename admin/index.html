2px;font-size:12px;padding:10px 14px;background:var(--bg-input);border-radius:8px;"></div> <div class="card"> <div id="books-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> <div id="panel-themes" style="display:none;"> <div class="card"> <p style="font-size:12px;color:var(--text-secondary);margin-bottom:20px;">Select a theme. New themes can be added by dropping a CSS file into <code style="color:var(--text-muted)">public/themes/</code> and deploying.</p> <div id="themes-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> </div> <script type="module" src="/_astro/admin.astro_astro_type_script_index_0_lang.B0ytnEDn.js"></script>  <nav class="bottom-nav" id="bottom-nav"> <a href="/shelf" class="nav-item" data-page="shelf"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"></path><path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"></path><line x1="9" y1="10" x2="15" y2="10"></line></svg> <span>Library</span> </a> <a href="/player" class="nav-item" data-page="player" id="nav-player"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg> <span>Now Playing</span> </a> <a href="/admin" class="nav-item nav-admin" data-page="admin" id="nav-admin" style="display:none;"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg> <span>Admin</span> </a> </nav>  <script>(function(){const isProtected = true;
const adminOnly = true;
const API = "https://api.thevelatium.net";

    const token = sessionStorage.getItem('literacy_token');
    const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');

    if (isProtected && !token) {
      location.href = '/';
    }
    if (adminOnly && (!user || user.role !== 'admin')) {
      location.href = '/shelf';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }

    window.API = API;
    window.authToken = token;
    window.currentUser = user;

    // Load active theme from API
    fetch(`${API}/config/theme`)
      .then(r => r.json())
      .then(d => {
        if (d.active && d.active !== 'noir') {
          document.getElementById('theme-css').href = `/themes/${d.active}.css`;
        }
      })
      .catch(() => {});

    // Bottom nav — mark active page, show admin link if admin
    if (isProtected) {
      const page = location.pathname.replace(/\/$/, '').split('/').pop() || 'shelf';
      const activeLink = document.querySelector(`.nav-item[data-page="${page}"]`);
      if (activeLink) activeLink.classList.add('active');

      if (user && user.role === 'admin') {
        const adminLink = document.getElementById('nav-admin');
        if (adminLink) adminLink.style.display = 'flex';
      }

      // Grey out Now Playing if no book is in progress
      const lastSlug = localStorage.getItem('literacy_last_slug');
      const playerLink = document.getElementById('nav-player');
      if (playerLink && !lastSlug) {
        playerLink.style.opacity = '0.35';
        playerLink.style.pointerEvents = 'none';
      }
    }
  })();</script> </body> </html>
