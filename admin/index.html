<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#000000"><link rel="manifest" href="/manifest.json"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/src/styles/tokens.css"><link id="theme-css" rel="stylesheet" href="/themes/noir.css"><title>Literacy — Admin</title></head> <body>  <div class="topbar"> <div class="logo"> <div class="logo-mark" style="width:32px;height:32px;"> <svg class="logo-arcs" viewBox="0 0 48 48" fill="none"> <path d="M24 36 Q12 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q8 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q4 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 36 Q36 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q40 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q44 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> </svg> <span class="logo-n" style="font-size:20px;">N</span> </div> </div> <div class="topbar-right"><a href="/shelf">← Library</a></div> </div> <div style="padding:0 20px 40px;"> <div class="admin-tabs"> <button class="tab-btn active" id="tab-access" onclick="showTab('access')">Access Requests</button> <button class="tab-btn" id="tab-catalog" onclick="showTab('catalog')">Catalog</button> <button class="tab-btn" id="tab-themes" onclick="showTab('themes')">Themes</button> </div> <div id="panel-access"> <div class="card"> <div id="users-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> <div id="panel-catalog" style="display:none;"> <div class="card" style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;"> <div> <div style="font-size:13px;font-weight:600;">Library Scan</div> <div style="font-size:11px;color:var(--text-secondary);">Detect new folders in the server library and add them automatically.</div> </div> <button class="btn-sm approve" id="scan-btn" onclick="scanLibrary()" style="white-space:nowrap;">Scan Library</button> </div> <div id="scan-result" style="display:none;margin-bottom:12px;font-size:12px;padding:10px 14px;background:var(--bg-input);border-radius:8px;"></div> <div class="card"> <div id="books-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> <div id="panel-themes" style="display:none;"> <div class="card"> <p style="font-size:12px;color:var(--text-secondary);margin-bottom:20px;">Select a theme. New themes can be added by dropping a CSS file into <code style="color:var(--text-muted)">public/themes/</code> and deploying.</p> <div id="themes-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> </div> <script type="module" src="/_astro/admin.astro_astro_type_script_index_0_lang.B0ytnEDn.js"></script>  <script>(function(){const isProtected = true;
const adminOnly = true;
const API = "https://api.thevelatium.net";

    const token = sessionStorage.getItem('literacy_token');
    const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');

    if (isProtected && !token) {
      location.href = '/';
    }
    if (adminOnly && (!user || user.role !== 'admin')) {
      location.href = '/shelf';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }

    window.API = API;
    window.authToken = token;
    window.currentUser = user;

    // Load active theme from API
    fetch(`${API}/config/theme`)
      .then(r => r.json())
      .then(d => {
        if (d.active && d.active !== 'noir') {
          document.getElementById('theme-css').href = `/themes/${d.active}.css`;
        }
      })
      .catch(() => {});
  })();</script> </body> </html>
