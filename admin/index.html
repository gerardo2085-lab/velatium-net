</style></head> <body> <!-- Persistent audio engine — survives page transitions --> <audio id="global-audio" data-astro-transition-persist="astro-lennmlil-1"></audio>  <div class="topbar"> <div class="logo"> <div class="logo-mark" style="width:32px;height:32px;"> <svg class="logo-arcs" viewBox="0 0 48 48" fill="none"> <path d="M24 36 Q12 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q8 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q4 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 36 Q36 24 24 12" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 40 Q40 24 24 8" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"></path> <path d="M24 44 Q44 24 24 4" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"></path> </svg> <span class="logo-n" style="font-size:20px;">N</span> </div> </div> <div class="topbar-right"><a href="/shelf">← Library</a></div> </div> <div style="padding:0 20px 40px;"> <div class="admin-tabs"> <button class="tab-btn active" id="tab-access" onclick="showTab('access')">Access Requests</button> <button class="tab-btn" id="tab-catalog" onclick="showTab('catalog')">Catalog</button> <button class="tab-btn" id="tab-themes" onclick="showTab('themes')">Themes</button> </div> <div id="panel-access"> <div class="card"> <div id="users-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> <div id="panel-catalog" style="display:none;"> <div class="card" style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;"> <div> <div style="font-size:13px;font-weight:600;">Library Scan</div> <div style="font-size:11px;color:var(--text-secondary);">Detect new folders in the server library and add them automatically.</div> </div> <button class="btn-sm approve" id="scan-btn" onclick="scanLibrary()" style="white-space:nowrap;">Scan Library</button> </div> <div id="scan-result" style="display:none;margin-bottom:12px;font-size:12px;padding:10px 14px;background:var(--bg-input);border-radius:8px;"></div> <div class="card"> <div id="books-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> <div id="panel-themes" style="display:none;"> <div class="card"> <p style="font-size:12px;color:var(--text-secondary);margin-bottom:20px;">Select a theme. New themes can be added by dropping a CSS file into <code style="color:var(--text-muted)">public/themes/</code> and deploying.</p> <div id="themes-list"><p style="color:var(--text-muted);font-size:13px;">Loading…</p></div> </div> </div> </div> <script type="module" src="/_astro/admin.astro_astro_type_script_index_0_lang.5NbyARHO.js"></script>  <!-- Mini-player — soft-nav <a> tag so ClientRouter intercepts it (no hard reload) --> <div id="mini-player" class="mini-player" style="display:none;" data-astro-transition-persist="astro-fvg4dbco-2"> <a href="#" id="mini-info-tap" class="mini-info"> <div id="mini-title" class="mini-title">—</div> <div id="mini-chapter" class="mini-chapter">—</div> </a> <button id="mini-btn" class="mini-btn" aria-label="Play/Pause"> <svg id="mini-icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> <svg id="mini-icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> </button> </div> <nav class="bottom-nav" id="bottom-nav"> <a href="/shelf" class="nav-item" data-page="shelf"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"></path><path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"></path><line x1="9" y1="10" x2="15" y2="10"></line></svg> <span>Library</span> </a> <a href="/admin" class="nav-item" data-page="admin" id="nav-admin" style="display:none;"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg> <span>Admin</span> </a> </nav>  <script>(function(){const isProtected = true;
const adminOnly = true;
const API = "https://api.thevelatium.net";

    window.API = API;

    // ── Auth ──────────────────────────────────────────────────────────────
    function checkAuth() {
      const token = sessionStorage.getItem('literacy_token');
      const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');
      window.authToken   = token;
      window.currentUser = user;
      if (isProtected && !token)                        { location.href = '/'; return; }
      if (adminOnly && (!user || user.role !== 'admin')){ location.href = '/shelf'; return; }
    }
    checkAuth();

    // ── Service worker ────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    if (navigator.storage?.persist) navigator.storage.persist().catch(() => {});

    // ── Theme ─────────────────────────────────────────────────────────────
    fetch(`${API}/config/theme`)
      .then(r => r.json())
      .then(d => {
        if (d.active && d.active !== 'noir')
          document.getElementById('theme-css').href = `/themes/${d.active}.css`;
      }).catch(() => {});

    // ── Global audio (set up once, persists across View Transitions) ──────
    if (!window.__audioReady) {
      window.__audioReady = true;
      const audio = document.getElementById('global-audio');
      window.__audio     = audio;
      window.__audioSlug = null;

      function syncMiniPlayIcon() {
        const play  = document.getElementById('mini-icon-play');
        const pause = document.getElementById('mini-icon-pause');
        if (!play || !pause) return;
        play.style.display  = audio.paused ? 'block' : 'none';
        pause.style.display = audio.paused ? 'none'  : 'block';
      }

      audio.addEventListener('play',  syncMiniPlayIcon);
      audio.addEventListener('pause', syncMiniPlayIcon);
      audio.addEventListener('ended', syncMiniPlayIcon);

      window.__updateMiniPlayer = (slug, bookTitle, chapterLabel) => {
        window.__audioSlug = slug;
        const mp = document.getElementById('mini-player');
        const t  = document.getElementById('mini-title');
        const c  = document.getElementById('mini-chapter');
        if (t) t.textContent = bookTitle;
        if (c) c.textContent = chapterLabel;
        if (mp) mp.style.display = 'flex';
        document.body.classList.add('has-mini-player');
        syncMiniPlayIcon();
      };

      window.__hideMiniPlayer = () => {
        const mp = document.getElementById('mini-player');
        if (mp) mp.style.display = 'none';
        document.body.classList.remove('has-mini-player');
        window.__audioSlug = null;
      };
    }

    // ── Per-navigation wiring (runs on every page load / transition) ──────
    document.addEventListener('astro:page-load', wireNav);
    wireNav(); // also run immediately for first load

    function wireNav() {
      const token = sessionStorage.getItem('literacy_token');
      const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');

      // Active nav link
      if (isProtected) {
        const page = location.pathname.replace(/\/$/, '').split('/').pop() || 'shelf';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeLink = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (activeLink) activeLink.classList.add('active');

        // Show admin link
        if (user?.role === 'admin') {
          const al = document.getElementById('nav-admin');
          if (al) al.style.display = 'flex';
        }

        // Mini-player tap → update href so ClientRouter handles soft navigation
        const miniInfo = document.getElementById('mini-info-tap');
        if (miniInfo && window.__audioSlug) {
          miniInfo.href = `/player?slug=${window.__audioSlug}`;
        }

        // Mini-player play/pause button
        const miniBtn = document.getElementById('mini-btn');
        if (miniBtn) {
          miniBtn.onclick = () => {
            const a = window.__audio || document.getElementById('global-audio');
            if (!a) return;
            if (a.paused) a.play().catch(() => {}); else a.pause();
          };
        }

        // Hide mini-player on player page (controls are right there)
        const onPlayer = location.pathname.includes('/player');
        const mp = document.getElementById('mini-player');
        if (mp) {
          if (onPlayer) {
            mp.style.display = 'none';
            document.body.classList.remove('has-mini-player');
          } else if (window.__audioSlug) {
            mp.style.display = 'flex';
            document.body.classList.add('has-mini-player');
          }
        }
      }
    }
  })();</script> </body> </html>
