-events:none;z-index:0;"></div> <div id="seek-thumb" style="position:absolute;top:50%;left:0%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:3;transition:left 0.1s linear;"></div> </div> <div class="controls"> <button class="ctrl-btn" id="btn-prev" title="Previous chapter">⏮</button> <button class="ctrl-btn" id="btn-back" title="Skip back 15s"> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"> <polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.41"></path> <text x="8" y="17" font-size="5" fill="white" stroke="none">15</text> </svg> </button> <button class="ctrl-btn ctrl-btn-lg" id="btn-play">▶</button> <button class="ctrl-btn" id="btn-fwd" title="Skip forward 15s"> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"> <polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-.49-3.41"></path> <text x="8" y="17" font-size="5" fill="white" stroke="none">15</text> </svg> </button> <button class="ctrl-btn" id="btn-next" title="Next chapter">⏭</button> </div> <div class="secondary-controls"> <button class="sec-btn" id="btn-chapters"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
Chapters
</button> <button class="sec-btn" id="btn-speed"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg> <span id="speed-label">1×</span> </button> </div> <div id="chapters-panel" style="display:none;width:100%;max-width:360px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);max-height:300px;overflow-y:auto;" class="card"></div> </div> <script type="module" src="/_astro/player.astro_astro_type_script_index_0_lang.D9WjXjcl.js"></script>  <!-- Mini-player — soft-nav <a> tag so ClientRouter intercepts it (no hard reload) --> <div id="mini-player" class="mini-player" style="display:none;" data-astro-transition-persist="astro-fvg4dbco-2"> <a href="#" id="mini-info-tap" class="mini-info"> <div id="mini-title" class="mini-title">—</div> <div id="mini-chapter" class="mini-chapter">—</div> </a> <button id="mini-btn" class="mini-btn" aria-label="Play/Pause"> <svg id="mini-icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> <svg id="mini-icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> </button> </div> <nav class="bottom-nav" id="bottom-nav"> <a href="/shelf" class="nav-item" data-page="shelf"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"></path><path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"></path><line x1="9" y1="10" x2="15" y2="10"></line></svg> <span>Library</span> </a> <a href="/admin" class="nav-item" data-page="admin" id="nav-admin" style="display:none;"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg> <span>Admin</span> </a> </nav>  <script>(function(){const isProtected = true;
const adminOnly = false;
const API = "https://api.thevelatium.net";

    window.API = API;

    // ── Auth ──────────────────────────────────────────────────────────────
    function checkAuth() {
      const token = sessionStorage.getItem('literacy_token');
      const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');
      window.authToken   = token;
      window.currentUser = user;
      if (isProtected && !token)                        { location.href = '/'; return; }
      if (adminOnly && (!user || user.role !== 'admin')){ location.href = '/shelf'; return; }
    }
    checkAuth();

    // ── Service worker ────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    if (navigator.storage?.persist) navigator.storage.persist().catch(() => {});

    // ── Theme ─────────────────────────────────────────────────────────────
    fetch(`${API}/config/theme`)
      .then(r => r.json())
      .then(d => {
        if (d.active && d.active !== 'noir')
          document.getElementById('theme-css').href = `/themes/${d.active}.css`;
      }).catch(() => {});

    // ── Global audio (set up once, persists across View Transitions) ──────
    if (!window.__audioReady) {
      window.__audioReady = true;
      const audio = document.getElementById('global-audio');
      window.__audio     = audio;
      window.__audioSlug = null;

      function syncMiniPlayIcon() {
        const play  = document.getElementById('mini-icon-play');
        const pause = document.getElementById('mini-icon-pause');
        if (!play || !pause) return;
        play.style.display  = audio.paused ? 'block' : 'none';
        pause.style.display = audio.paused ? 'none'  : 'block';
      }

      audio.addEventListener('play',  syncMiniPlayIcon);
      audio.addEventListener('pause', syncMiniPlayIcon);
      audio.addEventListener('ended', syncMiniPlayIcon);

      window.__updateMiniPlayer = (slug, bookTitle, chapterLabel) => {
        window.__audioSlug = slug;
        const mp = document.getElementById('mini-player');
        const t  = document.getElementById('mini-title');
        const c  = document.getElementById('mini-chapter');
        if (t) t.textContent = bookTitle;
        if (c) c.textContent = chapterLabel;
        if (mp) mp.style.display = 'flex';
        document.body.classList.add('has-mini-player');
        syncMiniPlayIcon();
      };

      window.__hideMiniPlayer = () => {
        const mp = document.getElementById('mini-player');
        if (mp) mp.style.display = 'none';
        document.body.classList.remove('has-mini-player');
        window.__audioSlug = null;
      };
    }

    // ── Per-navigation wiring (runs on every page load / transition) ──────
    document.addEventListener('astro:page-load', wireNav);
    wireNav(); // also run immediately for first load

    function wireNav() {
      const token = sessionStorage.getItem('literacy_token');
      const user  = JSON.parse(sessionStorage.getItem('literacy_user') || 'null');

      // Active nav link
      if (isProtected) {
        const page = location.pathname.replace(/\/$/, '').split('/').pop() || 'shelf';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeLink = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (activeLink) activeLink.classList.add('active');

        // Show admin link
        if (user?.role === 'admin') {
          const al = document.getElementById('nav-admin');
          if (al) al.style.display = 'flex';
        }

        // Mini-player tap → update href so ClientRouter handles soft navigation
        const miniInfo = document.getElementById('mini-info-tap');
        if (miniInfo && window.__audioSlug) {
          miniInfo.href = `/player?slug=${window.__audioSlug}`;
        }

        // Mini-player play/pause button
        const miniBtn = document.getElementById('mini-btn');
        if (miniBtn) {
          miniBtn.onclick = () => {
            const a = window.__audio || document.getElementById('global-audio');
            if (!a) return;
            if (a.paused) a.play().catch(() => {}); else a.pause();
          };
        }

        // Hide mini-player on player page (controls are right there)
        const onPlayer = location.pathname.includes('/player');
        const mp = document.getElementById('mini-player');
        if (mp) {
          if (onPlayer) {
            mp.style.display = 'none';
            document.body.classList.remove('has-mini-player');
          } else if (window.__audioSlug) {
            mp.style.display = 'flex';
            document.body.classList.add('has-mini-player');
          }
        }
      }
    }
  })();</script> </body> </html>
